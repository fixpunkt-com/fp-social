{namespace core = TYPO3\CMS\Core\ViewHelpers}

<f:form action="update" controller="PostLink" arguments="{postLink : postLink}" object="{postLink}" objectName="postLink">
    <f:form.hidden property="hidden" value="{f:if(condition : postLink.hidden, then : '0', else : '1')}" />
    <f:form.button type="submit" class="btn btn-default" title="Diesen Post {f:if(condition : postLink.hidden, then : 'einblenden', else : 'ausblenden')}">
        <f:if condition="{postLink.hidden}">
            <f:then>
                <core:icon identifier="actions-toggle-off" size="small" />
            </f:then>
            <f:else>
                <core:icon identifier="actions-toggle-on" size="small" />
            </f:else>
        </f:if>
    </f:form.button>
</f:form>
